<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Similarity Search</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1/dist/mobilenet.min.js"></script>
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <h1>🔍 Image Similarity Search</h1>
        <p id="datasetCounter" class="dataset-counter">Dataset: 0 images</p>
      </header>

      <section id="errorBanner" class="error-banner hidden" role="alert">
        <span id="errorBannerText"></span>
        <button id="retryModelBtn" type="button">Retry</button>
      </section>

      <section id="modelLoading" class="loading-panel">
        <div class="spinner" aria-hidden="true"></div>
        <p>Loading MobileNet model...</p>
      </section>

      <section id="querySection" class="panel">
        <div
          id="dropZone"
          class="drop-zone"
          tabindex="0"
          role="button"
          aria-label="Upload query image"
        >
          <input id="queryInput" type="file" accept="image/*" hidden />
          <div id="dropZonePrompt">
            <p>Drag & drop or click to upload query image</p>
          </div>
          <img id="queryPreview" class="query-preview hidden" alt="Query preview" />
        </div>
        <p id="queryError" class="inline-error hidden"></p>
      </section>

      <section class="panel controls">
        <label for="thresholdRange" class="threshold-label">
          Threshold: <span id="thresholdValue">0.60</span>
        </label>
        <input
          id="thresholdRange"
          type="range"
          min="0.3"
          max="0.9"
          step="0.01"
          value="0.6"
        />
        <div class="button-row">
          <button id="searchBtn" type="button" disabled title="Model still loading, please wait">
            Search
          </button>
          <button id="downloadCurrentBtn" type="button" class="hidden">
            Download results as JSON
          </button>
        </div>
        <p id="controlsError" class="inline-error hidden"></p>
      </section>

      <section class="panel">
        <h2 id="resultsTitle">Results (0 matches)</h2>
        <div id="resultsContainer" class="results-grid"></div>
        <p id="resultsEmpty" class="empty-state hidden"></p>
      </section>

      <section class="panel">
        <h2>Add to Dataset</h2>
        <div class="upload-row">
          <input id="datasetInput" type="file" accept="image/*" multiple webkitdirectory />
          <p id="uploadStatus" class="muted"></p>
        </div>
        <p id="uploadError" class="inline-error hidden"></p>
      </section>

      <footer class="panel footer-row">
        <button id="downloadLogBtn" type="button">Download full search log</button>
      </footer>
    </div>

    <div id="lightbox" class="lightbox hidden" role="dialog" aria-modal="true" aria-label="Image preview">
      <button id="lightboxClose" class="lightbox-close" type="button" aria-label="Close lightbox">✕</button>
      <img id="lightboxImage" class="lightbox-image" alt="Full-size result" />
    </div>

    <script type="module" src="./ui.js"></script>
  </body>
</html>
